name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test-and-build:
    name: Build & Push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Uses docker-container driver to support layer caching
          driver: docker-container

      - name: Debug Docker Credentials
        run: |
          echo "Username begins with: '${USERNAME:0:1}'"
          echo "Username ends with: '${USERNAME: -1}'"
          echo "Username length: ${#USERNAME}"
          echo "Token length: ${#TOKEN}"
        env:
          USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Docker Hub
        # Only login if it's a push to main (don't push on PRs)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Replace 'yourusername/narrative-bias-api' with your actual desired repository name 
          images: ${{ secrets.DOCKERHUB_USERNAME }}/narrative-bias-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Expose GitHub Actions cache to Docker Buildx for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Local Machine
    needs: test-and-build
    # Only run deployment when we are pushing to main, not on pull requests
    if: github.event_name != 'pull_request'
    # This targets your machine which you registered as a GitHub self-hosted runner!
    runs-on: self-hosted
    
    steps:
      - name: Pull latest image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/narrative-bias-api:latest
            
      - name: Stop existing container
        continue-on-error: true
        run: |
          docker stop bias-api
          docker rm bias-api
          
      - name: Run new container
        run: docker run -d --name bias-api -p 8000:8000 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/narrative-bias-api:latest
